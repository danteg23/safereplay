name: Check YouTube availability

on:
  schedule:
    - cron: "7,22,37,52 * * * *"
  workflow_dispatch:

permissions:
  actions: write
  contents: write

concurrency:
  group: youtube-availability
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: main
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Check every SafeReplay YouTube video
        run: node scripts/check-youtube-availability.mjs
      - name: Publish changed availability
        id: publish
        run: |
          if git diff --quiet -- config/youtube-availability.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add config/youtube-availability.json
          git commit -m "chore: refresh YouTube availability"
          git pull --rebase origin main
          git push origin HEAD:main
          echo "changed=true" >> "$GITHUB_OUTPUT"
      - name: Deploy the updated catalogue
        if: steps.publish.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run pages.yml --ref main
